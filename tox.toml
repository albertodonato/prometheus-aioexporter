requires = [ "tox>=4.6" ]

[env_run_base]
runner = "uv-venv-runner"
package = "wheel"
dependency_groups = [ "dev", "tests" ]
commands = [ [ "pytest", { replace = "posargs", default = [ "--cov", "prometheus_aioexporter/" ], extend = true } ] ]

[env.check]
dependency_groups = [ "dev", "tests" ]
commands = [ [ "mypy", "prometheus_aioexporter", "tests", { replace = "posargs", default = [], extend = true } ] ]

[env.format]
package = "skip"
dependency_groups = [ "dev" ]
commands = [
  [ "ruff", "format", "prometheus_aioexporter", "tests" ],
  [ "ruff", "check", "--fix", "prometheus_aioexporter", "tests" ],
  [ "-", "pyproject-fmt", "pyproject.toml" ],
  [ "-", "tox-toml-fmt", "tox.toml" ],
]

[env.lint]
package = "skip"
dependency_groups = [ "dev" ]
commands = [
  [ "ruff", "check", "prometheus_aioexporter", "tests" ],
  [ "pyproject-fmt", "--check", "pyproject.toml" ],
  [ "tox-toml-fmt", "--check", "tox.toml" ],
]

[env.sample]
package = "editable"
commands = [
  [ "python", "-m", "prometheus_aioexporter.sample", { replace = "posargs", default = [], extend = true } ],
]
